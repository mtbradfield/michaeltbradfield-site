local_backend: true

backend:
  name: git-gateway
  branch: main

media_folder: "src/assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "library"
    label: "Library Items"
    folder: "src/library-items"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"

    fields:
      - label: "Layout"
        name: "layout"
        widget: "select"
        required: true
        default: "layouts/essay.njk"
        options:
          - { label: "Readable Page (Essay / Reflection)", value: "layouts/essay.njk" }
          - { label: "Document Record (PDF / Formal Document)", value: "layouts/document-record.njk" }

      - { label: "Title", name: "title", widget: "string" }
      - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
      - { label: "Epigraph", name: "epigraph", widget: "text", required: false }
      - { label: "Epigraph Attribution", name: "epigraph_attribution", widget: "string", required: false }
      - { label: "Description", name: "description", widget: "text" }

      - label: "Permalink Base"
        name: "permalink_base"
        widget: "select"
        required: false
        options:
          - { label: "Essays", value: "/essays/" }
          - { label: "Reflections", value: "/reflections/" }
          - { label: "Working Papers", value: "/working-papers/" }
          - { label: "Notes", value: "/notes/" }
          - { label: "Endorsement", value: "/endorsement/" }
          - { label: "Pluralism", value: "/pluralism/" }
          - { label: "Covenantal Economics", value: "/covenantal-economics/" }
          - { label: "Transforming Community", value: "/transforming-community/" }
          - { label: "Voter Identification", value: "/voter-identification/" }

      - label: "Permalink Slug"
        name: "permalink_slug"
        widget: "string"
        required: false
        hint: "Short lowercase slug, e.g. rank-matters or nativity-illustrated-stories/story-one"

      - { label: "Permalink", name: "permalink", widget: "string" }

      - { label: "Back Link", name: "back_link", widget: "string", required: false }
      - { label: "Back Label", name: "back_label", widget: "string", required: false }

      - label: "Form"
        name: "form"
        widget: "select"
        options:
          - { label: "Essay", value: "essay" }
          - { label: "Reflection", value: "reflection" }
          - { label: "Working Paper", value: "working-paper" }
          - { label: "Note", value: "note" }

      - label: "Level"
        name: "level"
        widget: "select"
        required: false
        options:
          - { label: "Working", value: "working" }
          - { label: "Foundational", value: "foundational" }

      - label: "Forms Shelf Membership"
        name: "forms"
        widget: "select"
        multiple: true
        required: false
        options:
          - { label: "Essay", value: "essay" }
          - { label: "Reflection", value: "reflection" }
          - { label: "Working Paper", value: "working-paper" }
          - { label: "Note", value: "note" }

      - label: "Topic Shelf Membership"
        name: "topics"
        widget: "select"
        multiple: true
        required: false
        options:
          - { label: "Faith & Theology", value: "faith-and-theology" }
          - { label: "Institutions & Leadership", value: "institutions-and-leadership" }
          - { label: "Public Life & Ethics", value: "public-life-and-ethics" }
          - { label: "Spirituality & Community", value: "spirituality-and-community" }

      - label: "Project Shelf Membership"
        name: "projects"
        widget: "select"
        multiple: true
        required: false
        options:
          - { label: "Endorsement", value: "endorsement" }
          - { label: "Pluralism", value: "pluralism" }
          - { label: "Covenantal Economics", value: "covenantal-economics" }
          - { label: "Transforming Community", value: "transforming-community" }
          - { label: "Voter Identification", value: "voter-identification" }

      - label: "Transforming Community Lane"
        name: "tc_lane"
        widget: "select"
        required: false
        options:
          - { label: "Reflection", value: "reflection" }
          - { label: "Engagement", value: "engagement" }
          - { label: "Facilitation", value: "facilitation" }

      - label: "Series ID"
        name: "series"
        widget: "string"
        required: false
        hint: "Short slug, e.g. nativity-illustrated-stories"

      - label: "Series Title"
        name: "series_title"
        widget: "string"
        required: false

      - label: "Series Order"
        name: "series_order"
        widget: "number"
        required: false
        value_type: "int"

      - label: "Series Description"
        name: "series_description"
        widget: "text"
        required: false

      - label: "Publication Status"
        name: "publication_status"
        widget: "select"
        required: true
        default: "public"
        options:
          - { label: "Public", value: "public" }
          - { label: "Private", value: "private" }

      - label: "Publication Platforms"
        name: "publication_platforms"
        widget: "select"
        multiple: true
        required: false
        options:
          - { label: "Substack", value: "substack" }

      - { label: "Publication URL", name: "publication_url", widget: "string", required: false }
      - { label: "Publication Date", name: "publication_date", widget: "string", required: false }

      - { label: "Featured Anywhere", name: "featured", widget: "boolean", default: false }
      - { label: "Show on Home Page", name: "feature_home", widget: "boolean", default: false }
      - { label: "Home Feature Order", name: "feature_home_order", widget: "number", required: false, value_type: "int" }

      - label: "Feature Section"
        name: "feature_section"
        widget: "select"
        required: false
        options:
          - { label: "Endorsement", value: "endorsement" }
          - { label: "Pluralism", value: "pluralism" }
          - { label: "Covenantal Economics", value: "covenantal-economics" }
          - { label: "Transforming Community", value: "transforming-community" }
          - { label: "Voter Identification", value: "voter-identification" }
          - { label: "Essays", value: "essay" }
          - { label: "Reflections", value: "reflection" }
          - { label: "Working Papers", value: "working-paper" }
          - { label: "Notes", value: "note" }
          - { label: "Faith & Theology", value: "faith-and-theology" }
          - { label: "Institutions & Leadership", value: "institutions-and-leadership" }
          - { label: "Public Life & Ethics", value: "public-life-and-ethics" }
          - { label: "Spirituality & Community", value: "spirituality-and-community" }

      - { label: "Feature Section Order", name: "feature_section_order", widget: "number", required: false, value_type: "int" }
      - { label: "Feature Blurb", name: "feature_blurb", widget: "text", required: false }

      - { label: "Document File", name: "document_file", widget: "file", required: false }
      - label: "Document Type"
        name: "document_type"
        widget: "select"
        required: false
        options:
          - { label: "PDF", value: "pdf" }

      - { label: "Author", name: "author", widget: "string", default: "Michael T. Bradfield" }
      - { label: "First Written", name: "first_written", widget: "string", required: false }
      - { label: "Revised", name: "revised", widget: "string", required: false }

      - label: "Related Reading"
        name: "related_reading"
        widget: "list"
        required: false
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "URL", name: "url", widget: "string" }
          - label: "Type"
            name: "type"
            widget: "select"
            required: false
            options:
              - { label: "Essay", value: "essay" }
              - { label: "Reflection", value: "reflection" }
              - { label: "Working Paper", value: "working-paper" }
              - { label: "Note", value: "note" }
              - { label: "Shelf", value: "shelf" }
              - { label: "Project", value: "project" }
              - { label: "Topic", value: "topic" }

      - label: "Tags"
        name: "tags"
        widget: "select"
        multiple: true
        required: false
        options:
          - { label: "Essay", value: "essay" }
          - { label: "Reflection", value: "reflection" }
          - { label: "Working Paper", value: "working-paper" }
          - { label: "Note", value: "note" }

      - { label: "Body", name: "body", widget: "markdown", required: false }